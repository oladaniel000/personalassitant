services:
  - type: web
    name: telegram-daily-assistant
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    plan: free
    healthCheckPath: /healthz
    disk:
      name: assistant-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: urn:ietf:wg:oauth:2.0:oob
      - key: ORS_API_KEY
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: USER_TIMEZONE
        value: Africa/Lagos
      - key: MORNING_SUMMARY_TIME
        value: "07:00"
      - key: EVENING_RECAP_TIME
        value: "21:00"
      - key: DB_PATH
        value: /data/assistant.db
